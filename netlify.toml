[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Stack leve: nenhuma Scheduled Function esta registrada no Netlify.
# Os handlers permanecem disponiveis para chamadas manuais, sem execucao periodica.
# Timeout fetch Next → Evolution (sendMedia/vídeo): ACTIVATION_EVOLUTION_FETCH_TIMEOUT_MS (padrão 180000).
# Rotas app/api/crm/activations/send e mass-send/process usam maxDuration = 300 onde suportado.
# Scheduled Functions: process-campaign-queue, process-message-queue, check-instances-status
# Maturador: maturation-tick roda a cada 1 minuto; maturation-scheduler desativado
# process-campaign-queue e process-message-queue: rodam a cada 1 minuto para processar jobs das filas
# process-activation-mass-send: agenda 1/min (limite Netlify); polling em segundos via MASS_SEND_CRON_POLL_INTERVAL_MS na função
# process-group-fetch-jobs: reinvoca background para jobs pending (fallback se POST da API falhar)
# check-instances-status: roda a cada 5 minutos para verificar status das instâncias
# flow-question-timeouts: melhor esforço no Netlify (mín. ~1/min). Para 1s use polling em instrumentation ou cron externo.
[functions]
  [functions."groups-fetch-background"]
    timeout = 900
  [functions."process-campaign-queue"]
    timeout = 120
  [functions."process-message-queue"]
  [functions."process-activation-mass-send"]
    # Timeout alto: a função faz vários POSTs a /mass-send/process com pausa de MASS_SEND_CRON_POLL_INTERVAL_MS (default 2s) entre eles.
    timeout = 120
  [functions."process-broadcast-queue"]
    timeout = 26
  [functions."check-instances-status"]
  [functions."list-cleaning-resume"]
  [functions."process-group-fetch-jobs"]
    timeout = 26
  [functions."audit-group-names-sync"]
  [functions."academy-vturb-snapshots"]
  [functions."transfer-expired-notify"]
  [functions."transfer-resolve-expired"]
    # Timeout em segundos (máx. 26 no Netlify). Permite esperar a resposta da API que processa até 5 logs por run.
    timeout = 26
  [functions."maturation-tick"]
    # Resposta do cron-tick volta rápido (tick em after()); margem para cold start + fetch.
    timeout = 60
  [functions."flow-question-timeouts"]
  [functions."anti-spam-group-scanner"]
    # Timeout alto: escaneia grupos em lotes de 5, com rate limit de 1 req/s. Pode demorar dependendo do nº de grupos.
    timeout = 300
  # [functions."maturation-scheduler"]
  #   schedule = "*/10 * * * *"
