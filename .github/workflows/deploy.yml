name: Deploy stack leve na VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SSH_HOST

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 60m
          script: |
            set -Eeuo pipefail

            DEPLOY_DIR="/opt/crm-ated"
            cd "$DEPLOY_DIR"

            echo "Atualizando código..."
            test -d .git
            test -f .env
            previous_commit="$(git rev-parse HEAD)"
            git fetch origin main
            git checkout main
            git merge --ff-only origin/main

            application_changed=1
            if git diff --quiet "$previous_commit" HEAD -- . \
              ':(exclude)migrations/**' \
              ':(exclude)docs/**' \
              ':(exclude)*.md' \
              ':(exclude).github/**'; then
              application_changed=0
            fi

            echo "Validando ambiente e Compose..."
            test -n "$(sed -n 's/^NEXT_PUBLIC_SUPABASE_URL=//p' .env)"
            test -n "$(sed -n 's/^NEXT_PUBLIC_SUPABASE_ANON_KEY=//p' .env)"
            test -n "$(sed -n 's/^SUPABASE_SERVICE_ROLE_KEY=//p' .env)"
            test "$(sed -n 's/^ZAPLOTO_APP_SCOPE=//p' .env)" = "modelagem"
            docker compose config --quiet

            echo "Aplicando migrations modelagem..."
            docker exec supabase-db psql -U postgres -d postgres -v ON_ERROR_STOP=1 -c \
              "CREATE TABLE IF NOT EXISTS public.app_migration_history (filename text PRIMARY KEY, applied_at timestamptz NOT NULL DEFAULT now());"
            for migration_file in migrations/modelagem/[0-9][0-9]_*.sql; do
              migration_name="$(basename "$migration_file")"
              already_applied="$(docker exec supabase-db psql -U postgres -d postgres -tAc \
                "SELECT 1 FROM public.app_migration_history WHERE filename = '${migration_name}'")"
              if [ "$already_applied" = "1" ]; then
                echo "Ignorando já aplicada: $migration_name"
                continue
              fi
              echo "Aplicando: $migration_file"
              docker exec -i supabase-db \
                psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
                < "$migration_file"
              printf "INSERT INTO public.app_migration_history (filename) VALUES ('%s');\n" "$migration_name" | \
                docker exec -i supabase-db psql -U postgres -d postgres -v ON_ERROR_STOP=1
            done

            if [ "$application_changed" = "0" ]; then
              echo "Somente migrations/documentação: build e restart dispensados."
              docker compose ps
              exit 0
            fi

            echo "Construindo imagem única..."
            docker compose build app1

            wait_for_health() {
              service="$1"
              port="$2"
              for attempt in $(seq 1 36); do
                if curl --connect-timeout 3 --max-time 5 -fsS \
                  "http://127.0.0.1:${port}/api/health" >/dev/null; then
                  echo "$service saudável na porta $port"
                  return 0
                fi
                sleep 5
              done
              echo "Health check falhou: $service na porta $port"
              docker compose logs --tail=120 "$service"
              return 1
            }

            echo "Atualização gradual: app2..."
            docker compose up -d --no-deps --force-recreate app2
            wait_for_health app2 3001

            echo "Atualização gradual: app1..."
            docker compose up -d --no-deps --force-recreate app1
            wait_for_health app1 3000

            docker compose up -d --remove-orphans

            docker image prune -f
            docker compose ps
            echo "Deploy concluído."
