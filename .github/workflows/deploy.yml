name: Deploy ZaplotoV3 na VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SSH_HOST

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -e

            DEPLOY_DIR="/home/claudeuser/ZaplotoV3"

            # Se o diretório não existir, faz clone (segurança contra reboot)
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "📥 Diretório não encontrado, clonando repositório..."
              git clone https://github.com/Zaploto/ZaplotoV3.git "$DEPLOY_DIR"
            fi

            echo "📦 Acessando diretório do projeto..."
            cd "$DEPLOY_DIR"

            echo "🔄 Fazendo git pull..."
            git pull origin main

            echo "🐳 Subindo containers..."
            docker compose up --build -d

            echo "🧹 Limpando imagens antigas..."
            docker image prune -f

            echo "✅ Deploy concluído!"
