name: Deploy ZaplotoV3 na VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SSH_HOST

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 60m
          script: |
            set -e

            DEPLOY_DIR="/home/claudeuser/ZaplotoV3"

            # Se o diretório não existir, faz clone
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "📥 Clonando repositório..."
              git clone https://github.com/Zaploto/ZaplotoV3.git "$DEPLOY_DIR"
            fi

            echo "📦 Acessando diretório..."
            cd "$DEPLOY_DIR"

            echo "🔄 Fazendo git pull..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Build usando cache da imagem anterior..."
            docker compose build

            echo "🚀 Subindo containers sem derrubar os outros..."
            docker compose up -d --no-deps --remove-orphans

            echo "🧹 Limpando apenas imagens sem uso (dangling)..."
            docker image prune -f

            echo "✅ Deploy concluído!"
            docker compose ps