name: Deploy ZaplotoV3 na VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SSH_HOST

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 60m
          script: |
            set -e

            DEPLOY_DIR="/home/claudeuser/ZaplotoV3"

            # Se o diretório não existir, faz clone
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "📥 Clonando repositório..."
              git clone https://github.com/Zaploto/ZaplotoV3.git "$DEPLOY_DIR"
            fi

            echo "📦 Acessando diretório..."
            cd "$DEPLOY_DIR"

            echo "🔄 Fazendo git pull..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Build usando cache da imagem anterior..."
            docker compose build

            echo "🐰 Subindo RabbitMQ primeiro (workers dependem do broker healthy)..."
            docker compose up -d rabbitmq

            echo "⏳ Aguardando RabbitMQ healthy (até 15 min, sem loop de restart)..."
            RABBIT_OK=0
            RABBIT_RESTARTED=0
            WAIT_SECS=10
            MAX_LOOPS=90
            for i in $(seq 1 "$MAX_LOOPS"); do
              STATUS="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' rabbitmq 2>/dev/null || echo missing)"
              RUNNING="$(docker inspect --format='{{.State.Status}}' rabbitmq 2>/dev/null || echo missing)"

              if [ "$STATUS" = "healthy" ]; then
                echo "✅ RabbitMQ healthy (~$((i * WAIT_SECS))s de espera)"
                RABBIT_OK=1
                break
              fi

              echo "… RabbitMQ status=$STATUS running=$RUNNING (tentativa $i/$MAX_LOOPS)"

              # Nunca reiniciar em loop: no máximo 1 restart após ~3 min unhealthy
              if [ "$STATUS" = "unhealthy" ] && [ "$RABBIT_RESTARTED" = "0" ] && [ "$i" -ge 18 ]; then
                echo "⚠️ RabbitMQ unhealthy — reinício único (aguarde ~2 min após isso)..."
                docker compose restart rabbitmq || true
                RABBIT_RESTARTED=1
                sleep 30
                continue
              fi

              sleep "$WAIT_SECS"
            done
            if [ "$RABBIT_OK" != "1" ]; then
              echo "❌ RabbitMQ não ficou healthy após $((MAX_LOOPS * WAIT_SECS))s."
              echo "--- docker inspect health ---"
              docker inspect rabbitmq --format='{{json .State.Health}}' 2>&1 || true
              echo "--- últimos logs rabbitmq ---"
              docker logs rabbitmq --tail 150 2>&1 || true
              docker compose ps rabbitmq 2>&1 || true
              exit 1
            fi

            echo "🚀 Subindo apps, cron e workers..."
            docker compose up -d --remove-orphans

            echo "🧹 Limpando apenas imagens sem uso (dangling)..."
            docker image prune -f

            echo "✅ Deploy concluído!"
            docker compose ps