networks:
  ZAPLOTOV3:
    name: ZAPLOTOV3
    external: true

services:
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    image: zaplotov3-app
    container_name: zaplotov3-1
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=4096"
      PORT: 3000
      CRON_ENABLED: "true"
      SITE_URL: "https://zaploto.com"
      INTERNAL_API_BASE_URL: "http://localhost:3000"
    networks:
      - ZAPLOTOV3
    volumes:
      - cron_logs:/var/log
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app2:
    image: zaplotov3-app
    container_name: zaplotov3-2
    restart: unless-stopped
