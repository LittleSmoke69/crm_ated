networks:
  ZAPLOTOV3:
    name: ZAPLOTOV3
    external: true

# Stack leve para o escopo "modelagem": somente as duas instancias HTTP.
# Filas, disparos, anti-spam, maturacao e cron/Netlify nao sobem containers.
x-zaplotov3-base: &zaplotov3-base
  image: zaplotov3-app
  restart: unless-stopped
  env_file: .env
  dns:
    - 8.8.8.8
    - 1.1.1.1
  networks:
    - ZAPLOTOV3

x-app-env: &app-env
  NODE_ENV: production
  NODE_OPTIONS: "--max-old-space-size=1024"
  TZ: "UTC"
  NEXT_PUBLIC_ZAPLOTO_APP_SCOPE: "modelagem"
  ZAPLOTO_APP_SCOPE: "modelagem"
  NEXT_PUBLIC_ZAPLOTO_DISABLE_EVOLUTION_STACK: "true"
  ZAPLOTO_DISABLE_EVOLUTION_STACK: "true"
  # Nenhuma replica executa tickers internos. A stack leve nao processa envios.
  IS_TICKER_LEADER: "false"

services:
  app1:
    <<: *zaplotov3-base
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
        - NEXT_PUBLIC_ZAPLOTO_APP_SCOPE=modelagem
        - NEXT_PUBLIC_ZAPLOTO_DISABLE_EVOLUTION_STACK=true
    container_name: zaplotov3-1
    cpus: "1.5"
    mem_limit: 1536m
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      <<: *app-env
      PORT: 3000
      INTERNAL_API_BASE_URL: "http://localhost:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app2:
    <<: *zaplotov3-base
    container_name: zaplotov3-2
    cpus: "1.5"
    mem_limit: 1536m
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      <<: *app-env
      PORT: 3001
      INTERNAL_API_BASE_URL: "http://localhost:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
