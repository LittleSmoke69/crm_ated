networks:
  ZAPLOTOV3:
    name: ZAPLOTOV3
    external: true

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    cpus: "1"
    mem_limit: 512m
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ZAPLOTOV3
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  app1:
    build:
      context: .
      dockerfile: Dockerfile
    image: zaplotov3-app
    container_name: zaplotov3-1
    restart: unless-stopped
    cpus: "3"
    mem_limit: 3g
    ports:
      - "3000:3000"
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=2048"
      PORT: 3000
      CRON_ENABLED: "false"
      SITE_URL: "https://zaploto.com"
      INTERNAL_API_BASE_URL: "http://localhost:3000"
      WEBHOOK_WORKER_CONCURRENCY: "0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
    networks:
      - ZAPLOTOV3
    volumes:
      - cron_logs:/var/log
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app2:
    image: zaplotov3-app
    container_name: zaplotov3-2
    restart: unless-stopped
    cpus: "3"
    mem_limit: 3g
    ports:
      - "3001:3001"
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=2048"
      PORT: 3001
      CRON_ENABLED: "false"
      INTERNAL_API_BASE_URL: "http://localhost:3001"
      WEBHOOK_WORKER_CONCURRENCY: "0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
    networks:
      - ZAPLOTOV3
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app3:
    image: zaplotov3-app
    container_name: zaplotov3-3
    restart: unless-stopped
    cpus: "3"
    mem_limit: 3g
    ports:
      - "3002:3002"
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=2048"
      PORT: 3002
      CRON_ENABLED: "false"
      INTERNAL_API_BASE_URL: "http://localhost:3002"
      WEBHOOK_WORKER_CONCURRENCY: "0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
    networks:
      - ZAPLOTOV3
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app4:
    image: zaplotov3-app
    container_name: zaplotov3-4
    restart: unless-stopped
    cpus: "3"
    mem_limit: 3g
    ports:
      - "3003:3003"
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=2048"
      PORT: 3003
      CRON_ENABLED: "false"
      INTERNAL_API_BASE_URL: "http://localhost:3003"
      WEBHOOK_WORKER_CONCURRENCY: "0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
    networks:
      - ZAPLOTOV3
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3003/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  cron:
    image: zaplotov3-app
    container_name: zaplotov3-cron
    restart: unless-stopped
    cpus: "1"
    mem_limit: 512m
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: production
      CRON_ONLY: "true"
      WEBHOOK_WORKER_CONCURRENCY: "0"
    networks:
      - ZAPLOTOV3
    volumes:
      - cron_logs:/var/log

  worker1:
    image: zaplotov3-app
    container_name: zaplotov3-worker1
    restart: unless-stopped
    cpus: "1"
    mem_limit: 512m
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: production
      RABBITMQ_WORKER_ONLY: "true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      RABBITMQ_WORKER_PREFETCH: "10"
      RABBITMQ_MAX_RETRIES: "3"
    networks:
      - ZAPLOTOV3
    volumes:
      - cron_logs:/var/log
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker2:
    image: zaplotov3-app
    container_name: zaplotov3-worker2
    restart: unless-stopped
    cpus: "1"
    mem_limit: 512m
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: production
      RABBITMQ_WORKER_ONLY: "true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      RABBITMQ_WORKER_PREFETCH: "10"
      RABBITMQ_MAX_RETRIES: "3"
    networks:
      - ZAPLOTOV3
    volumes:
      - cron_logs:/var/log
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  cron_logs:
  rabbitmq_data:
